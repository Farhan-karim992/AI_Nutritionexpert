{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Profile Setup</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h2>Complete Your Profile</h2>

        <form method="post">
            {% csrf_token %}

            <input type="number" name="age" placeholder="Age"
                   value="{{ profile.age|default:'' }}" required>

            <input type="number" step="0.1" name="height"
                   placeholder="Height (cm)"
                   value="{{ profile.height|default:'' }}" required>

            <input type="number" step="0.1" name="weight"
                   placeholder="Weight (kg)"
                   value="{{ profile.weight|default:'' }}" required>

            <select name="goal" required style="width:100%;padding:14px;border-radius:12px;margin-bottom:18px;">
                <option value="">Select Goal</option>
                <option value="lose" {% if profile.goal == 'lose' %}selected{% endif %}>Lose Weight</option>
                <option value="gain" {% if profile.goal == 'gain' %}selected{% endif %}>Gain Weight</option>
                <option value="maintain" {% if profile.goal == 'maintain' %}selected{% endif %}>Maintain Weight</option>
            </select>

            <button type="submit">Save Profile</button>
        </form>

    </div>
</div>

</body>
</html>
