
<!DOCTYPE html>
<html>
<head>
    <title>Nutrition AI Chatbot</title>

    <style>

        body {
            background: #f4f7fb;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .chat-header {
            background: #2563eb;
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-box {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 15px;
            border-radius: 15px;
            line-height: 1.6;
            white-space: pre-line;
            white-space: pre-wrap;
        }

        .user-bubble {
            background: #2563eb;
            color: white;
        }

        .bot-bubble {
            background: #e5e7eb;
            color: black;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            border-top: 1px solid #ddd;
            background: white;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 15px 25px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .chat-input button:hover {
            background: #1d4ed8;
        }
    .typing-indicator {
    display: none;
    padding: 10px 15px;
    background: #e5e7eb;
    width: fit-content;
    border-radius: 12px;
    margin-bottom: 15px;
    animation: fadeIn 0.3s ease;
}

.typing-indicator span {
    height: 8px;
    width: 8px;
    background: #555;
    border-radius: 50%;
    display: inline-block;
    margin: 0 2px;
    animation: bounce 1.3s infinite;
}

.typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes bounce {
    0%, 80%, 100% {
        transform: translateY(0);
    }

    40% {
        transform: translateY(-6px);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message {
    animation: fadeIn 0.4s ease;
}
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        Nutrition AI Assistant
    </div>

    <div class="chat-box" id="chatBox">
      <div
    class="typing-indicator"
    id="typingIndicator"
>
    <span></span>
    <span></span>
    <span></span>
</div>
        {% if user_message %}

        <div class="message user-message">
            <div class="bubble user-bubble">
                {{ user_message }}
            </div>
        </div>

        {% endif %}

        {% if reply %}

        <div class="message bot-message">
            <div class="bubble bot-bubble">
                {{ reply }}
            </div>
        </div>

        {% endif %}

    </div>

    <form method="POST" class="chat-input">

        {% csrf_token %}

        <input
            type="text"
            name="message"
            placeholder="I ate 3 eggs and rice"
            required
        >

        <button type="submit">
            Send
        </button>

    </form>

</div>
<script>

const form = document.querySelector("form");
const typingIndicator = document.getElementById(
    "typingIndicator"
);

form.addEventListener("submit", () => {

    typingIndicator.style.display = "block";

});

const chatBox = document.getElementById(
    "chatBox"
);

chatBox.scrollTop = chatBox.scrollHeight;

// AI typing animation
const botBubble = document.querySelector(
    ".bot-bubble"
);

if (botBubble) {

    const text = botBubble.innerText;

    botBubble.innerText = "";

    let index = 0;

    function typeEffect() {

        if (index < text.length) {

           botBubble.innerHTML += text.charAt(index)
    .replace(/\n/g, "<br>");

            index++;

            setTimeout(typeEffect, 15);
        }
    }

    typeEffect();
}

</script>
</body>
</html>
